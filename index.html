<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    
    <style>
      
      * { margin: 0; padding: 0; box-sizing: border-box; } 
      body { 
          display: flex; justify-content: center; align-items: center; min-height: 100vh; 
          background-color: #333; overflow: hidden; 
      } 
      #game-container { 
          position: relative; width: 400px; height: 600px; background-color: #87CEEB; 
          border-radius: 10px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); overflow: hidden; 
      } 
      #bird { 
          position: absolute; width: 40px; height: 40px; background-color: #FF5733; 
          border-radius: 50%; transition: top 0.05s linear; 
      } 
      .pipe { position: absolute; width: 60px; background-color: #00FF00; } 
      .score { 
          position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10; 
          font-size: 40px; color: white; 
          text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000; 
      }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="bird"></div>
        <div class="score">0</div>
        
    </div>
    <!-- <script src="game.js"></script> -->
</body>
</html>
